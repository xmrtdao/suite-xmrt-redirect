name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - run: npm ci 2>/dev/null || true
    - run: npx htmlhint '**/*.html' 2>/dev/null || npx linkinator . --skip '^(?!http)' 2>/dev/null || echo "No HTML linter configured"
